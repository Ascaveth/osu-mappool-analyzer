services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      ALLOWED_ORIGINS: http://localhost:3000

  frontend:
    build:
      context: ./frontend
      args:
        # Baked in at build time (NEXT_PUBLIC_*) — must be a URL the
        # *browser* can reach, not the Docker-internal service name, since
        # API calls happen client-side. localhost:8080 works because the
        # backend port is published to the host above.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
